<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비바샘 중고등 CXP — 목업</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Helvetica Neue', sans-serif;
  background: #E8ECF1;
  color: #1A1A2E;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  font-size: 13px;
}

/* ── 상단 레이블 ── */
.top-label {
  width: 100%;
  max-width: 860px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.top-title { font-size: 11px; font-weight: 700; color: #9CA3AF; letter-spacing: .06em; }
.step-pills { display: flex; gap: 4px; }
.step-pill {
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  background: #fff; color: #9CA3AF; border: 1px solid #E5E7EB;
  cursor: pointer; transition: all .12s;
}
.step-pill.active { background: #0D2B55; color: #fff; border-color: #0D2B55; }
.step-pill.done { background: #E0F2FE; color: #185FA5; border-color: #BAE6FD; }

/* ── 브라우저 크롬 ── */
.browser {
  width: 100%;
  max-width: 860px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.13);
  overflow: hidden;
}

.b-chrome {
  background: #F3F4F6;
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #E5E7EB;
}
.b-dots { display: flex; gap: 5px; }
.b-dots span { width: 9px; height: 9px; border-radius: 50%; }
.d1{background:#FC5F5A;} .d2{background:#FDBC2C;} .d3{background:#35CD4B;}
.b-url {
  flex: 1; background: #fff; border-radius: 5px;
  padding: 4px 10px; font-size: 11px; color: #9CA3AF;
  border: 1px solid #E5E7EB; text-align: center;
}
.b-logo { font-size: 13px; font-weight: 700; color: #0891B2; }

/* ── GNB ── */
.gnb {
  background: #0D2B55;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 44px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.gnb-logo { font-size: 14px; font-weight: 700; color: #fff; margin-right: 20px; }
.gnb-logo span { color: #38BDF8; }
.gnb-menu { display: flex; }
.gnb-item {
  font-size: 12px; color: #7FA8C9;
  padding: 0 14px; height: 44px;
  display: flex; align-items: center;
  cursor: pointer; border-bottom: 2px solid transparent;
}
.gnb-item.on { color: #fff; border-bottom-color: #38BDF8; }

/* ── 교과 서브탭 ── */
.subj-bar {
  background: #F9FAFB;
  border-bottom: 1px solid #E5E7EB;
  padding: 0 20px;
  display: flex;
  gap: 0;
}
.subj-tab {
  font-size: 12px; color: #9CA3AF;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 5px;
  transition: all .12s;
  white-space: nowrap;
}
.subj-tab:hover { color: #374151; }
.subj-tab.active { color: #0D2B55; font-weight: 600; border-bottom-color: #0891B2; }
.subj-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── 본문 ── */
.body { padding: 20px; min-height: 440px; }

/* ── 공통 컴포넌트 ── */
.sec-title {
  font-size: 13px; font-weight: 700; color: #1A1A2E;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sec-sub { font-size: 11px; color: #9CA3AF; font-weight: 400; margin-left: 4px; }

/* 단원 그리드 */
.unit-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.unit-card {
  border-radius: 9px; border: 1.5px solid #E5E7EB;
  padding: 12px; cursor: pointer; transition: all .12s;
  background: #fff;
}
.unit-card:hover { border-color: #BAE6FD; background: #F0F9FF; }
.unit-card.sel { border-color: #0891B2; background: #EFF6FF; }
.uc-num { font-size: 10px; color: #9CA3AF; margin-bottom: 3px; }
.uc-name { font-size: 12px; font-weight: 600; color: #1A1A2E; margin-bottom: 6px; line-height: 1.4; }
.uc-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.uc-tag { font-size: 9px; padding: 1px 6px; border-radius: 8px; }
.tc { background:#FAEEDA; color:#854F0B; }
.ts { background:#E0F2FE; color:#185FA5; }
.tg { background:#EEEDFE; color:#534AB7; }

/* 이력 바 */
.history-bar {
  background: #F0FDF9; border-radius: 8px;
  border: 1px solid #A7F3D0;
  padding: 9px 13px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.hb-text { font-size: 11px; color: #065F46; }
.hb-btn {
  font-size: 10px; padding: 3px 9px; border-radius: 20px;
  background: #10B981; color: #fff; cursor: pointer;
  border: none; font-weight: 600;
}

/* 레이어 탭 전환 */
.layer-tabs {
  display: flex; gap: 0;
  border: 1px solid #E5E7EB; border-radius: 8px;
  overflow: hidden; margin-bottom: 14px;
}
.layer-tab {
  flex: 1; padding: 8px 6px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; text-align: center;
  border-right: 1px solid #E5E7EB;
  transition: all .12s;
  background: #fff; color: #9CA3AF;
}
.layer-tab:last-child { border-right: none; }
.layer-tab.lt-c.active { background: #FAEEDA; color: #854F0B; }
.layer-tab.lt-s.active { background: #E0F2FE; color: #185FA5; }
.layer-tab.lt-g { color: #9CA3AF; }
.layer-tab.lt-g:hover { background: #EEEDFE; color: #534AB7; }
.layer-tab small { display: block; font-size: 9px; font-weight: 400; margin-top: 1px; opacity: .7; }

/* 완성형 목록 */
.complete-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.c-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 9px;
  border: 1px solid #E5E7EB; background: #fff;
  cursor: pointer; transition: all .12s;
}
.c-item:hover { border-color: #BAE6FD; background: #F0F9FF; }
.c-icon {
  width: 34px; height: 34px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.c-text { flex: 1; min-width: 0; }
.c-name { font-size: 12px; font-weight: 600; color: #1A1A2E; }
.c-sub { font-size: 10px; color: #9CA3AF; margin-top: 1px; }
.c-btns { display: flex; gap: 4px; flex-shrink: 0; }
.c-btn {
  font-size: 10px; padding: 3px 8px; border-radius: 5px;
  border: 1px solid #E5E7EB; background: #F9FAFB;
  color: #6B7280; cursor: pointer;
}
.c-btn.primary { background: #E0F2FE; border-color: #BAE6FD; color: #0C447C; font-weight: 600; }

.c-notice {
  background: #FEF9EE; border-radius: 8px;
  border: 1px solid #FDE68A; padding: 9px 12px;
  font-size: 11px; color: #78350F; line-height: 1.6;
}
.c-notice-link { color: #0891B2; cursor: pointer; text-decoration: underline; }

/* 탐색형 */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%; padding: 10px 40px 10px 14px;
  border-radius: 8px; border: 1.5px solid #0891B2;
  font-size: 12px; font-family: inherit;
  outline: none; background: #F0F9FF; color: #1A1A2E;
}
.search-input::placeholder { color: #9CA3AF; }
.search-icon {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px; color: #0891B2;
}

/* ── 탐색형 v2: 수업 흐름 진입 ── */
.explore-header {
  background: #EFF6FF; border: 1px solid #BFDBFE;
  border-radius: 8px; padding: 9px 12px; margin-bottom: 12px;
  font-size: 11px; color: #1E40AF; line-height: 1.6;
}
.explore-header strong { color: #1D4ED8; }

/* 수업 순간 선택기 */
.moment-section { margin-bottom: 14px; }
.moment-label {
  font-size: 10px; font-weight: 700; color: #6B7280;
  margin-bottom: 7px; display: flex; align-items: center; gap: 5px;
}
.moment-label .ml-step {
  background: #0891B2; color: #fff;
  font-size: 9px; padding: 1px 6px; border-radius: 10px;
}
.moment-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.moment-card {
  border: 1.5px solid #E5E7EB; border-radius: 9px;
  padding: 9px 6px; text-align: center; cursor: pointer;
  background: #fff; transition: all .15s;
}
.moment-card:hover { border-color: #93C5FD; background: #F0F9FF; }
.moment-card.active {
  border-color: #0891B2; background: #EFF6FF;
  box-shadow: 0 0 0 2px #BFDBFE;
}
.mc-emoji { font-size: 18px; margin-bottom: 4px; }
.mc-name { font-size: 10px; font-weight: 700; color: #374151; margin-bottom: 2px; }
.mc-desc { font-size: 9px; color: #9CA3AF; line-height: 1.4; }
.moment-card.active .mc-name { color: #1D4ED8; }

/* STEP 2: 수업 목적 + 소요시간 */
.purpose-section { margin-bottom: 14px; }
.purpose-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.p-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid #E5E7EB; background: #fff;
  font-size: 11px; color: #6B7280; cursor: pointer; transition: all .12s;
}
.p-chip:hover { border-color: #93C5FD; color: #185FA5; }
.p-chip.on {
  border-color: #0891B2; background: #0891B2; color: #fff; font-weight: 600;
}
.p-chip .chip-icon { font-size: 13px; }

.time-row { display: flex; gap: 5px; margin-bottom: 4px; }
.t-chip {
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid #E5E7EB; background: #fff;
  font-size: 10px; color: #6B7280; cursor: pointer; transition: all .12s;
}
.t-chip:hover { border-color: #BAE6FD; color: #185FA5; }
.t-chip.on { border-color: #0891B2; background: #E0F2FE; color: #185FA5; font-weight: 600; }

.type-row { display: flex; gap: 5px; flex-wrap: wrap; }
.ty-chip {
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid #E5E7EB; background: #fff;
  font-size: 10px; color: #6B7280; cursor: pointer; transition: all .12s;
}
.ty-chip:hover { border-color: #E9D8FD; color: #6D28D9; }
.ty-chip.on { border-color: #7C3AED; background: #EDE9FE; color: #5B21B6; font-weight: 600; }

.filter-divider {
  display: flex; align-items: center; gap: 8px; margin: 8px 0;
  font-size: 10px; color: #D1D5DB;
}
.filter-divider::before, .filter-divider::after {
  content: ''; flex: 1; height: 1px; background: #E5E7EB;
}

/* 결과 영역 */
.result-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.result-count { font-size: 11px; color: #6B7280; }
.result-count strong { color: #0891B2; }
.result-context-badge {
  font-size: 10px; padding: 2px 9px; border-radius: 10px;
  background: #E0F2FE; color: #185FA5; border: 1px solid #BAE6FD;
}

/* 결과 카드 v2 */
.result-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
.r-item {
  border-radius: 10px; border: 1.5px solid #E5E7EB; background: #fff;
  cursor: pointer; transition: all .12s; overflow: hidden;
}
.r-item:hover { border-color: #93C5FD; box-shadow: 0 2px 8px rgba(8,145,178,.08); }
.r-item.hot { border-color: #0891B2; }
.r-item.expanded { border-color: #0891B2; }
.r-top {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
}
.r-accent { width: 4px; height: 40px; border-radius: 2px; background: #E5E7EB; flex-shrink: 0; }
.r-item.hot .r-accent { background: #0891B2; }
.r-item.expanded .r-accent { background: #0891B2; }
.r-main { flex: 1; min-width: 0; }
.r-name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.r-name { font-size: 12px; font-weight: 600; color: #1A1A2E; }
.r-hot-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #0891B2; color: #fff; }
.r-scenario { font-size: 10px; color: #374151; margin-bottom: 3px; line-height: 1.5; }
.r-meta { display: flex; align-items: center; gap: 8px; }
.r-tag { font-size: 9px; padding: 1px 7px; border-radius: 8px; }
.rt-purpose { background: #E0F2FE; color: #185FA5; }
.rt-time { background: #F3F4F6; color: #6B7280; }
.rt-type { background: #EDE9FE; color: #5B21B6; }
.r-users { font-size: 9px; color: #9CA3AF; margin-left: auto; white-space: nowrap; }
.r-actions { display: flex; gap: 4px; flex-shrink: 0; }
.r-btn { font-size: 10px; padding: 4px 9px; border-radius: 6px; border: 1px solid #E5E7EB; background: #F9FAFB; color: #6B7280; cursor: pointer; transition: all .1s; }
.r-btn:hover { background: #E5E7EB; }
.r-btn.primary { background: #0891B2; border-color: #0891B2; color: #fff; font-weight: 600; }
.r-btn.primary:hover { background: #0778A0; }

/* 미리보기 드로어 */
.r-preview {
  display: none; border-top: 1px solid #E5E7EB;
  background: #F9FAFB; padding: 10px 14px 12px;
}
.r-item.expanded .r-preview { display: block; }
.preview-title { font-size: 10px; font-weight: 700; color: #9CA3AF; margin-bottom: 8px; display: flex; justify-content: space-between; }
.preview-thumb {
  background: #fff; border: 1px solid #E5E7EB; border-radius: 7px;
  height: 72px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px; position: relative;
}
.preview-thumb-inner { font-size: 11px; color: #374151; font-weight: 600; }
.preview-thumb-label {
  position: absolute; bottom: 6px; right: 8px;
  font-size: 9px; color: #9CA3AF;
}
.preview-how {
  background: #EFF6FF; border-radius: 6px; border-left: 3px solid #0891B2;
  padding: 7px 10px; font-size: 10px; color: #1E40AF; line-height: 1.6;
  margin-bottom: 8px;
}
.preview-how strong { color: #1D4ED8; }
.preview-btns { display: flex; gap: 6px; }
.preview-btn { flex: 1; padding: 6px; border-radius: 7px; text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
.pb-add { background: #0891B2; color: #fff; }
.pb-studio { background: #0D2B55; color: #fff; }

/* 담은 자료 토스트 */
.cart-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #0D2B55; color: #fff; border-radius: 10px;
  padding: 10px 20px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity .2s;
  pointer-events: none; white-space: nowrap; z-index: 999;
}
.cart-toast.show { opacity: 1; pointer-events: auto; }
.ct-btn { font-size: 11px; padding: 3px 10px; border-radius: 5px; background: #38BDF8; color: #0D2B55; cursor: pointer; font-weight: 700; }

.no-result-tip {
  text-align: center; padding: 10px;
  font-size: 11px; color: #9CA3AF;
  background: #F9FAFB; border-radius: 8px;
}
.no-result-tip span { color: #534AB7; cursor: pointer; font-weight: 600; }

/* 기존 호환 유지 */
.filter-section { margin-bottom: 10px; }
.filter-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
.filter-label {
  font-size: 10px; font-weight: 700; color: #9CA3AF;
  white-space: nowrap; padding-top: 3px; width: 52px; flex-shrink: 0;
}
.filter-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.f-tag {
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid #E5E7EB; background: #fff; color: #6B7280;
  cursor: pointer; transition: all .12s;
}
.f-tag:hover { border-color: #BAE6FD; color: #185FA5; }
.f-tag.on { border-color: #0891B2; background: #E0F2FE; color: #185FA5; font-weight: 600; }
.result-header { font-size: 11px; color: #6B7280; margin-bottom: 8px; }
.result-header strong { color: #0891B2; }
.r-sub { font-size: 10px; color: #9CA3AF; }
.r-btns { display: flex; gap: 4px; flex-shrink: 0; }

/* 수업 스튜디오 */
.studio-flow {
  display: flex; gap: 4px; align-items: center;
  margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px;
}
.sf-step {
  font-size: 11px; padding: 5px 12px; border-radius: 6px;
  background: #F3F4F6; color: #9CA3AF; white-space: nowrap;
  cursor: pointer; transition: all .12s;
}
.sf-step.cur { background: #0D2B55; color: #fff; font-weight: 600; }
.sf-step:hover:not(.cur) { background: #E5E7EB; }
.sf-arrow { font-size: 12px; color: #D1D5DB; flex-shrink: 0; }

.studio-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }

.studio-main { background: #F9FAFB; border-radius: 9px; padding: 12px; }
.sm-label { font-size: 10px; color: #9CA3AF; margin-bottom: 8px; font-weight: 600; }
.slide-thumb {
  background: #fff; border: 1px solid #E5E7EB; border-radius: 7px;
  height: 100px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px; flex-direction: column; gap: 4px;
}
.slide-thumb-title { font-size: 12px; font-weight: 600; color: #374151; }
.slide-thumb-sub { font-size: 10px; color: #9CA3AF; }
.slide-minis { display: flex; gap: 4px; margin-bottom: 10px; }
.s-mini {
  flex: 1; height: 26px; border-radius: 4px;
  border: 1px solid #E5E7EB; background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #9CA3AF; cursor: pointer;
}
.s-mini.cur { border-color: #0891B2; color: #0891B2; font-weight: 700; }
.studio-acts { display: flex; gap: 6px; }
.sa-btn {
  flex: 1; padding: 7px 8px; border-radius: 7px;
  border: 1px solid #E5E7EB; background: #fff;
  font-size: 11px; color: #374151; cursor: pointer;
  text-align: center; transition: all .12s;
}
.sa-btn:hover { border-color: #BAE6FD; background: #F0F9FF; }
.sa-btn.gen { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; font-weight: 600; }
.sa-btn.gen:hover { background: #E0DEFE; }

.studio-side { display: flex; flex-direction: column; gap: 8px; }
.ss-card { background: #fff; border-radius: 9px; border: 1px solid #E5E7EB; padding: 10px 12px; }
.ss-label { font-size: 10px; color: #9CA3AF; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.ss-link {
  background: #F9FAFB; border-radius: 5px;
  padding: 5px 8px; font-size: 10px; color: #6B7280;
  font-family: monospace; margin-bottom: 6px;
}
.ss-btn {
  width: 100%; padding: 6px; border-radius: 6px;
  background: #0891B2; color: #fff;
  font-size: 11px; font-weight: 700; border: none; cursor: pointer;
}
.insight-card {
  background: #EAF3DE; border-radius: 9px;
  border: 1px solid #97C459; padding: 10px 12px;
}
.ic-label { font-size: 10px; font-weight: 700; color: #27500A; margin-bottom: 4px; }
.ic-text { font-size: 11px; color: #3B6D11; line-height: 1.6; }

/* 배포 */
.deploy-box { background: #F9FAFB; border-radius: 9px; border: 1px solid #E5E7EB; padding: 14px; margin-bottom: 12px; }
.deploy-title { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 10px; }
.link-row {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border: 1.5px solid #E5E7EB; border-radius: 7px;
  padding: 8px 12px; margin-bottom: 8px;
}
.link-text { flex: 1; font-size: 11px; color: #6B7280; font-family: monospace; }
.copy-btn {
  font-size: 10px; padding: 4px 12px; border-radius: 5px;
  background: #0891B2; color: #fff; border: none; cursor: pointer; font-weight: 600;
}
.share-opts { display: flex; gap: 6px; }
.share-opt {

let curSubj = 0;

// 교과 탭
function buildSubjBar() {
  document.getElementById('subjBar').innerHTML = SUBJECTS.map((s,i) =>
    `<div class="subj-tab${i===curSubj?' active':''}"
      style="${i===curSubj?'border-bottom-color:'+s.color+';color:'+s.color+';':''}"
      onclick="switchSubj(${i})">
      <div class="subj-dot" style="background:${s.color}"></div>${s.name}
    </div>`
  ).join('');
}

// 단계 pills
function buildPills() {
  document.getElementById('stepPills').innerHTML = STEPS.map((s,i) =>
    `<div class="step-pill${i===curStep?' active':i<curStep?' done':''}"
      onclick="go(${i})">${i+1}. ${s}</div>`
  ).join('');
  document.getElementById('navSteps').textContent = `${curStep+1} / ${STEPS.length}`;
  document.getElementById('navNext').textContent = curStep < STEPS.length-1 ? '다음 →' : '처음으로 ↺';
}

function switchSubj(i) {
  curSubj = i; curStep = 0; curLayer2 = 'complete';
  curMoment = null; curPurpose = null; expandedCard = null;
  buildSubjBar(); buildPills(); render();
}
function switchLayer(l) {
  curLayer2 = l;
  if(l === 'search') { curMoment = null; curPurpose = null; expandedCard = null; }
  render();
}
function go(n) { curStep = n; buildPills(); render(); }
function next() {
  if(curStep < STEPS.length-1) { curStep++; }
  else { curStep = 0; }
  curLayer2 = 'complete';
  buildPills(); render();
}
function prev() {
  if(curStep > 0) { curStep--; buildPills(); render(); }
}
function filterTag(el) {
  const p = el.closest('.filter-tags');
  p.querySelectorAll('.f-tag').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
}

          </div>`).join('')}
      </div>
      <div class="c-notice">
        💡 <strong>인터뷰 교사 100%가 "그대로 쓰지 않는다"고 답했습니다.</strong>
        수업에 더 맞는 자료가 필요하다면
        <span class="c-notice-link" onclick="switchLayer('search')">탐색형으로 전환 →</span>
      </div>`;
  } else {
    renderExplore(d);
  }
}

function renderExplore(d) {
  const el = document.getElementById('layerContent');
  if(!el) return;

  // 현재 선택된 moment
  const momentData = d.moments;
  const selMoment = momentData.find(m => m.key === curMoment);

  // 선택된 목적 기반 결과 카드 가져오기
  const resultCards = curMoment && d.resultCards[curMoment] ? d.resultCards[curMoment] : [];

  // purpose chips 목록
  const purposeChips = curMoment && d.purposeChips[curMoment] ? d.purposeChips[curMoment] : [];

  el.innerHTML = `
    <div class="explore-header">
      🔍 기존 자료실과 다릅니다. <strong>자료 유형이 아닌 수업 목적 기준</strong>으로 찾아드려요.
    </div>

    <!-- STEP 1: 수업 순간 선택 -->
    <div class="moment-section">
      <div class="moment-label">
        <span class="ml-step">1단계</span>
        지금 어떤 수업 순간을 준비하고 있나요?
      </div>
      <div class="moment-cards">
        ${momentData.map(m=>`
          <div class="moment-card${curMoment===m.key?' active':''}" onclick="selectMoment('${m.key}')">
            <div class="mc-emoji">${m.emoji}</div>
            <div class="mc-name">${m.name}</div>
            <div class="mc-desc">${m.desc}</div>
          </div>`).join('')}
      </div>
    </div>

    ${curMoment ? `
    <!-- STEP 2: 수업 목적 선택 -->
    <div class="purpose-section">
      <div class="moment-label">
        <span class="ml-step">2단계</span>
        ${selMoment ? selMoment.name : ''} 단계에서 이 자료로 무엇을 하려고 하나요?
      </div>
      <div class="purpose-row">
        ${purposeChips.map(p=>`
          <div class="p-chip${curPurpose===p.label?' on':''}" onclick="selectPurpose('${p.label}')">
            <span class="chip-icon">${p.icon}</span>${p.label}
          </div>`).join('')}
      </div>
      <div class="filter-divider">소요 시간</div>
      <div class="time-row">
        ${d.timeTags.map((t,i)=>`<span class="t-chip${i===0?' on':''}" onclick="toggleChip(this,'.time-row .t-chip')">${t}</span>`).join('')}
      </div>
    </div>` : ''}

    <!-- 결과 -->
    ${curMoment ? `
    <div class="result-bar">
      <div class="result-count">
        <strong>${resultCards.length}개</strong> 자료
        ${curPurpose ? `— "${curPurpose}" 기준` : `— "${selMoment ? selMoment.name : ''}" 기준`}
      </div>
      ${curPurpose ? `<div class="result-context-badge">✅ ${curPurpose}</div>` : ''}
    </div>
    <div class="result-list" id="exploreResults">
      ${resultCards.map((r, i) => renderResultCard(r, i)).join('')}
    </div>
    <div class="no-result-tip">
      원하는 자료가 없다면 → <span onclick="go(2)">✨ AI로 새로 만들기</span>
    </div>` : `
    <div style="text-align:center;padding:24px 0;color:#9CA3AF;font-size:12px;">
      위에서 수업 순간을 선택하면 맞춤 자료가 나타납니다.
    </div>`}
  `;
}

function renderResultCard(r, i) {
  const isExpanded = expandedCard === i;
  return `
    <div class="r-item${r.hot?' hot':''}${isExpanded?' expanded':''}" id="rcard-${i}">
      <div class="r-top" onclick="toggleCard(${i})">
        <div class="r-accent"></div>
        <div class="r-main">
          <div class="r-name-row">
            <div class="r-name">${r.name}</div>
            ${r.hot?'<span class="r-hot-badge">추천</span>':''}
          </div>
          <div class="r-scenario">${r.scenario}</div>
          <div class="r-meta">
            <span class="r-tag rt-purpose">${r.purpose}</span>
            <span class="r-tag rt-time">⏱ ${r.time}</span>
            <span class="r-tag rt-type">${r.type}</span>
            <span class="r-users">👤 지금 ${r.users}명 사용 중</span>
          </div>
        </div>
        <div class="r-actions">
          <button class="r-btn" onclick="event.stopPropagation();addToCart('${r.name}')">담기</button>
          <button class="r-btn primary" onclick="event.stopPropagation();toggleCard(${i})">${isExpanded?'닫기':'미리보기'}</button>
        </div>
      </div>
      <div class="r-preview">
        <div class="preview-title">
          <span>📄 자료 미리보기</span>
          <span style="color:#0891B2;cursor:pointer;" onclick="toggleCard(${i})">닫기 ✕</span>
        </div>
        <div class="preview-thumb">
          <div class="preview-thumb-inner">${r.name}</div>
          <div class="preview-thumb-label">축소 미리보기</div>
        </div>
        <div class="preview-how">${r.how}</div>
        <div class="preview-btns">
          <button class="preview-btn pb-add" onclick="addToCart('${r.name}')">📥 수업 스튜디오에 담기</button>
          <button class="preview-btn pb-studio" onclick="go(2)">🎨 바로 수업 스튜디오로 →</button>
        </div>
      </div>
    </div>`;
}

function selectMoment(key) {
  curMoment = key; curPurpose = null; expandedCard = null;
  renderExplore(DATA[SUBJECTS[curSubj].id]);
}
function selectPurpose(label) {
  curPurpose = curPurpose === label ? null : label;
  expandedCard = null;
  renderExplore(DATA[SUBJECTS[curSubj].id]);
}
function toggleChip(el, selector) {
  document.querySelectorAll(selector).forEach(t => t.classList.remove('on'));
  el.classList.add('on');
}
function toggleCard(i) {
  expandedCard = expandedCard === i ? null : i;
  renderExplore(DATA[SUBJECTS[curSubj].id]);
}
function addToCart(name) {
  const t = document.getElementById('cartToast');
  t.querySelector('.ct-name').textContent = name;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 초기화
buildSubjBar();
buildPills();
render();
</script>
</body>
</html>
